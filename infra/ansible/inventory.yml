---
# Static inventory. ONPREM_HOST comes from .envrc (single source of truth —
# same value used by config/deploy.yml via ERB).
#
# Adding another box: copy the host block, rename the key, point at a
# different env var (e.g. ONPREM_HOST_STAGING).

onprem:
  hosts:
    onprem-1:
      ansible_host: "{{ lookup('env', 'ONPREM_HOST') }}"
  vars:
    ansible_user: deploy
    ansible_port: 22
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
