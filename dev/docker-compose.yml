# Local stack — mirror of the prod compose document (`infra/iac/tofu/
# compose.tf`) running against local Docker.
#
# Everything an operator needs to develop iedora locally: postgres,
# localstack (S3 mock), openobserve, menu (Next.js). Identity is
# `@iedora/auth` (better-auth) running in-process inside the menu
# container — no IdP container.
#
# See docs/deploy.md § Local stack for the operator surface. See
# `dev/cmd/local-stack/` for the orchestrator.
#
# Selection is via compose profiles, one per service. The orchestrator
# passes `--profile X` per selected service. Default (no flags) starts
# everything. `--except <list>` drops profiles. `--only <list>` keeps
# only those profiles (+ their depends_on closure).

name: iedora-local

networks:
  iedora:
    name: iedora
    driver: bridge

volumes:
  postgres_data:
  localstack_data:
  openobserve_data:

services:

  # ── postgres ─────────────────────────────────────────────────────────
  # Same image as prod (postgres:18.4-alpine). init.sql is the canonical
  # one shared with prod — creates the `menu` and `core` databases.
  postgres:
    image: postgres:18.4-alpine
    container_name: infra-postgres
    profiles: [postgres]
    networks:
      iedora:
        aliases: [postgres, infra-postgres]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password1!
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../infra/iac/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: 10m }

  # ── localstack (S3 mock for menu uploads) ────────────────────────────
  localstack:
    image: localstack/localstack:4
    container_name: infra-localstack
    profiles: [localstack]
    networks:
      iedora:
        aliases: [localstack, infra-localstack]
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: 10m }

  # ── openobserve (observability) ──────────────────────────────────────
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.90.0
    container_name: infra-openobserve
    profiles: [openobserve]
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      iedora:
        aliases: [openobserve, infra-openobserve]
    environment:
      ZO_DATA_DIR: /data
      ZO_HTTP_PORT: "5080"
      ZO_GRPC_PORT: "5081"
      ZO_S3_PROVIDER: aws
      ZO_S3_REGION_NAME: us-east-1
      ZO_S3_BUCKET_NAME: iedora-data
      ZO_S3_BUCKET_PREFIX: o2
      ZO_S3_SERVER_URL: http://infra-localstack:4566
      ZO_S3_FEATURE_FORCE_PATH_STYLE: "true"
      ZO_S3_ACCESS_KEY: test
      ZO_S3_SECRET_KEY: test
      ZO_ROOT_USER_EMAIL: dev@iedora.local
      ZO_ROOT_USER_PASSWORD: Password1!
    volumes:
      - openobserve_data:/data
    ports:
      - "5080:5080"
    logging:
      driver: json-file
      options: { max-size: 10m }

  # ── menu (Next.js, built locally) ────────────────────────────────────
  # Env comes from `products/menu/.env` + optional `.env.local`. The
  # dev orchestrator runs the @iedora/auth migrations against the `core`
  # DB after postgres is healthy, then starts this container.
  menu:
    image: iedora-menu:local
    build:
      context: ..
      dockerfile: products/menu/Dockerfile
    container_name: infra-menu
    profiles: [menu]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      iedora:
        aliases: [menu, infra-menu]
    env_file:
      - path: ../products/menu/.env
        required: false
      - path: ../products/menu/.env.local
        required: false
    ports:
      - "3000:3000"
    command: ["node", "server.js"]
    logging:
      driver: json-file
      options: { max-size: 10m }
