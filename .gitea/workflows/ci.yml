# Pipeline — 4 jobs no mesmo workflow para gating natural e UI única:
#
#   changes → path filter   (computa output `source`)     [PR + push main + dispatch]
#   ci      → correctness   (typecheck/lint/test)         [needs source=true; skip cron]
#   audit   → security      (gitleaks/hadolint/osv)       [PR + push main + dispatch + cron]
#   deploy  → kamal deploy  (needs ci+audit, source=true) [push main + dispatch]
#
# `audit` corre sempre — gitleaks scan histórico, secrets podem aparecer
# em docs também. `ci` e `deploy` skip-am quando só docs/non-source
# mudam, poupando tempo de CI em PRs documentais.
#
# Steps inline (não composite actions) para o Gitea Actions mostrar
# cada step individualmente — bug #31397 ofusca steps dentro de
# composite. Bash não-trivial vive em .gitea/<concern>/*.sh (ex.:
# .gitea/audit/install-tools.sh), invocado por path absoluto. Mantém
# o workflow legível + bash testável isoladamente via shellcheck.
#
# Concurrency por-job (em vez de workflow-level): ci/audit cancelam
# runs antigos no mesmo branch para feedback rápido; deploy nunca
# cancela (mid-deploy abort = estado inconsistente). Cron weekly só
# corre `audit` (skip ci via `if:`, deploy gated por `needs` + `if:`)
# — CVE database refresca-se sem push.

name: Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Segunda 06:00 UTC — pesca CVEs novas

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path filter: ci + deploy só correm se source mudou (typescript,
  # lockfile, Dockerfile, configs Kamal, workflows próprios). Docs-only
  # PR/push skipa typecheck/lint/test/deploy. `audit` corre sempre
  # (gitleaks scan history; secret pode aparecer em docs também).
  # `workflow_dispatch` e `schedule` ignoram este filtro.
  # ─────────────────────────────────────────────────────────────────
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          # `fetch-depth: 2` chega para push events (BASE = parent do
          # commit actual). Para PR, o checkout traz HEAD e BASE
          # automaticamente; bump para 0 se houver squash-merges grandes.
          fetch-depth: 2
      - id: filter
        shell: bash
        # bash + `git diff --name-only` em vez de dorny/paths-filter:
        # Gitea Actions tem issues conhecidos com getFilesChanged
        # (issue #23919) e o proxy para actions externos não sempre
        # garante context completo. Esta implementação é debuggable
        # (echo do diff), zero deps externas, e funciona em PR + push.
        run: |
          set -euo pipefail

          # Manual trigger override — força tudo a correr
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "→ workflow_dispatch — forçar source=true"
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          # Edge case: BASE all-zeros = primeiro push da branch.
          # Compara contra empty tree para listar tudo como "changed".
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE=$(git hash-object -t tree --stdin </dev/null)
          fi

          echo "→ diff $BASE..$HEAD"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "── changed files ──"
          echo "$CHANGED"
          echo "───────────────────"

          if echo "$CHANGED" | grep -qE '\.(ts|tsx|js|mjs|cjs|json)$|^bun\.lock$|(^|/)Dockerfile$|^config/|^\.kamal/|^\.gitea/workflows/|^\.gitea/audit/|^\.gitea/deploy/|^homelab-core-infra/'; then
            echo "→ source=true (algum ficheiro relevante mudou)"
            echo "source=true" >> "$GITHUB_OUTPUT"
          else
            echo "→ source=false (só docs/non-source)"
            echo "source=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────
  # Correctness gate: typecheck + lint + test em paralelo workspace.
  # bun-debian label → oven/bun:1.3-debian (homelab-core-infra/
  # gitea-runner-config.yaml: GITEA_RUNNER_LABELS).
  # Bind-mount /var/cache/bun: bun install cache persiste entre runs.
  # ─────────────────────────────────────────────────────────────────
  ci:
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.source == 'true')
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    runs-on: bun-debian
    timeout-minutes: 15
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/bun:/root/.bun/install/cache
    steps:
      - uses: actions/checkout@v4

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: typecheck (all workspaces, paralelo, tsgo)
        run: bun run typecheck

      - name: lint (all workspaces, paralelo, eslint)
        run: bun run lint

      - name: test (all workspaces, sequencial, vitest internamente paraleliza)
        run: bun run test

  # ─────────────────────────────────────────────────────────────────
  # Security gate: 3 tools sobre o filesystem + lockfile + history.
  # Binários cached em /var/cache/audit-tools (bind-mount, idempotent
  # install via .gitea/audit/install-tools.sh).
  # ─────────────────────────────────────────────────────────────────
  audit:
    concurrency:
      group: audit-${{ github.ref }}
      cancel-in-progress: true
    runs-on: bun-debian
    timeout-minutes: 10
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/audit-tools:/opt/audit-bin
    env:
      GITLEAKS_VERSION: 8.30.1
      HADOLINT_VERSION: 2.14.0
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks varre commits — precisa do histórico completo.
          fetch-depth: 0

      - name: Restore or install audit binaries
        # Script idempotent: cada tool só descarrega se diferente da
        # versão pinned (env above). Cold start ~15s (apt + 3 binaries),
        # steady-state ~1s. Bash extraído para shellcheck local.
        shell: bash
        run: .gitea/audit/install-tools.sh

      - name: gitleaks (secret scan — full history, baseline-filtered)
        # --baseline-path: ignora 23 findings históricos pre-adoção
        # (test fixtures + .env + tfstate purged). Bloqueia só leaks
        # NOVOS. Re-gerar: gitleaks detect --report-format json
        # --report-path .gitleaks-baseline.json
        run: /opt/audit-bin/gitleaks detect --baseline-path .gitleaks-baseline.json --redact --verbose --no-banner --exit-code 1

      - name: hadolint (Dockerfile lint)
        # Wrapper converte findings em workflow annotations
        # (::warning::/::error::) que Gitea renderiza inline no PR.
        # Threshold: só level=error quebra CI. Warnings actuais aparecem
        # no PR para tracking (DL3008/DL3003/DL4006).
        run: .gitea/audit/run-hadolint.sh apps/web/Dockerfile

      - name: osv-scanner (lockfile CVEs)
        # --format gh-annotations: native emission de annotations para
        # cada CVE encontrada. Se houver findings novos, aparecem no PR
        # como comments inline no lockfile.
        run: /opt/audit-bin/osv-scanner --lockfile=bun.lock --format gh-annotations

  # ─────────────────────────────────────────────────────────────────
  # Deploy gate: kamal deploy para produção. Só corre se ci+audit OK.
  #
  # Setup deps não-óbvias:
  #   - `ruby-dev` + `build-essential` — gem ed25519 (dep do Kamal)
  #     compila extensão C nativa
  #   - Docker buildx plugin — `docker.io` apt não traz buildx, Kamal
  #     exige-o para o remote builder
  #   - BWS CLI + SSH key bootstrap — BWS_ACCESS_TOKEN é a única Gitea
  #     secret; restantes credenciais vivem em Bitwarden Secrets
  #
  # `kamal deploy`:
  #   - builds amd64 nativamente na Beelink (remote builder via SSH)
  #   - push para Gitea OCI registry
  #   - .kamal/hooks/pre-deploy aplica migrations
  #   - blue-green swap só se hook + healthcheck passarem; se falhar,
  #     versão antiga continua a servir (kamal-proxy não promove)
  #
  # Build cache (`kamal deploy` remote builder) é gerido pelo buildkit
  # da Beelink. Não usa actions/cache aqui — o build acontece via
  # docker buildx --builder remote, fora do job container. O container
  # kamal-remote-ssh--... preserva cache em volumes Docker entre runs.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.source == 'true')
    needs: [changes, ci, audit]
    concurrency:
      group: deploy-production
      cancel-in-progress: false   # mid-deploy abort would leave inconsistent state
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: node:24-bookworm
      # Bind-mount /var/cache/deploy-tools (binários + gem home)
      # cacheia entre runs. Whitelistado em homelab-core-infra/
      # gitea-runner-config.yaml valid_volumes.
      volumes:
        - /var/cache/deploy-tools:/opt/deploy-bin
    steps:
      - uses: actions/checkout@v4

      - name: Restore or install deploy tools
        # Idempotent: apt deps (ruby+dev/build-essential/docker.io)
        # corre cold cada run; buildx + bws + kamal gem são reutilizados
        # do volume. Cold ~60s, steady-state ~30s. Pattern espelha
        # `.gitea/audit/install-tools.sh`.
        shell: bash
        env:
          KAMAL_VERSION: "2.11.0"
          BUILDX_VERSION: "0.34.1"
          BWS_VERSION: "0.5.0"
        run: .gitea/deploy/install-tools.sh

      - name: Bootstrap SSH from BWS
        # Exporta KAMAL_BWS_PROJECT_ID para steps seguintes (via
        # $GITHUB_ENV). `.kamal/secrets.production` usa-o no `kamal
        # secrets fetch --adapter bitwarden-sm "$KAMAL_BWS_PROJECT_ID/
        # all"` — sem prefix o `bws secret list` lista tudo o que o
        # token vê (sem ordem garantida).
        #
        # KAMAL_REGISTRY_PASSWORD não vem por aqui — é Actions secret
        # publicada pelo `up.sh --bootstrap-ci` (registry auth é
        # interno ao homelab, não pertence ao BWS).
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          PROJECT_ID=$(bws project list -o json | jq -r '.[0].id')
          echo "KAMAL_BWS_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bws secret list "$PROJECT_ID" -o json \
            | python3 -c 'import sys,json; [print(s["value"]) for s in json.loads(sys.stdin.read(), strict=False) if s["key"]=="HOMELAB_SSH_PRIVATE_KEY"]' \
            > ~/.ssh/ci_ed25519
          chmod 600 ~/.ssh/ci_ed25519
          ssh-keyscan -H 192.168.50.53 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Release stale Kamal lock
        # Idempotent. Se um deploy anterior foi cancelado/crashou, o
        # lock fica no host e bloqueia o próximo. `|| true` cobre o
        # caso comum "não há lock para libertar".
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: kamal lock release -d production || true

      - name: Kamal deploy
        # Blue-green via kamal-proxy: se healthcheck falhar, NÃO faz
        # swap — versão antiga continua a servir. `kamal deploy`
        # retorna non-zero mas o estado é estável. Não há
        # auto-rollback no CI por isso — operador investiga o erro e
        # re-deploya quando estiver corrigido.
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: kamal deploy -d production
