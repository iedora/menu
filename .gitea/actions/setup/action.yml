# Composite action: workspace setup. Instala Bun (versão fixa), restaura
# cache global do bun install, e resolve todos os workspaces.
#
# Caller usa: `uses: ./.gitea/actions/setup`. Checkout é responsabilidade
# do caller.

name: 'Setup workspace'
description: 'Install Bun, prime the install cache, resolve every Bun workspace.'

inputs:
  bun-version:
    description: 'Bun version. Pin matches AGENTS.md.'
    required: false
    default: '1.3.14'

runs:
  using: composite
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun install dir
      uses: actions/cache@v4
      with:
        # Bun's GLOBAL cache, not node_modules — smaller, shared across
        # workspaces. Gitea's runner cache server (ACTIONS_CACHE_URL)
        # is local-disk per-runner. Key on bun.lock content.
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Resolve workspaces
      shell: bash
      run: bun install --frozen-lockfile
