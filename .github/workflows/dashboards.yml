# Apply app observability dashboards (dashboards-as-code) to OpenObserve.
# Runs on push to main when observability/ changes. The dashboard JSON in
# observability/dashboards/ is the source of truth; apply-dashboards.py upserts
# them by title into the "Applications" folder (idempotent).
#
# Requires repo secret O2_OBSERVE_PASSWORD and vars O2_OBSERVE_URL / O2_OBSERVE_EMAIL.
# See observability/README.md.
#
# Action pins (match CI):
#   actions/checkout@v6.0.3
name: Dashboards

on:
  push:
    branches: [main]
    paths:
      - 'observability/dashboards/**'
      - 'observability/apply-dashboards.py'
      - '.github/workflows/dashboards.yml'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    # Skip (don't fail) until OpenObserve apply is configured in repo settings.
    if: vars.O2_OBSERVE_URL != ''
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Apply dashboards to OpenObserve
        env:
          O2_URL: ${{ vars.O2_OBSERVE_URL }}
          O2_ORG: default
          O2_EMAIL: ${{ vars.O2_OBSERVE_EMAIL }}
          O2_PASSWORD: ${{ secrets.O2_OBSERVE_PASSWORD }}
        run: python3 observability/apply-dashboards.py observability/dashboards Applications
