# @iedora/auth-testkit CI.
#
# Boots a real Better Auth + @better-auth/oauth-provider against PGLite
# and walks the OIDC handshake. Re-exports genkan's schema, so a genkan
# schema change must retrigger this workflow.

name: Auth Testkit

on:
  push:
    branches: [main]
    paths:
      - 'packages/iedora-auth-testkit/**'
      - 'products/genkan/src/shared/db/schema.ts'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/auth-testkit.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/iedora-auth-testkit/**'
      - 'products/genkan/src/shared/db/schema.ts'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/auth-testkit.yml'
      - '.github/actions/setup/**'
  # `gh workflow run auth-testkit.yml --ref <branch>` — manual re-trigger.
  workflow_dispatch:

concurrency:
  group: auth-testkit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. CI does checkout + test only.
permissions:
  contents: read

jobs:
  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/iedora-auth-testkit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run test
