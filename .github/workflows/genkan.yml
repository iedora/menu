# Genkan CI.
#
# Runs typecheck + Vitest whenever genkan source or one of its dependencies
# changes. No e2e suite yet (see docs/testing.md "Why genkan has no
# Playwright suite").
#
# Self-contained on purpose: one file is the entire genkan CI surface.

name: Genkan

on:
  push:
    branches: [main]
    paths:
      - 'products/genkan/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-observability/**'
      - 'packages/iedora-auth-testkit/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/genkan.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/genkan/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-observability/**'
      - 'packages/iedora-auth-testkit/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/genkan.yml'
      - '.github/actions/setup/**'
  # `gh workflow run genkan.yml --ref <branch>` — manual re-trigger.
  workflow_dispatch:

concurrency:
  group: genkan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. CI does checkout + test only.
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/genkan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/genkan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/genkan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Run Vitest
        # Co-located + __tests__/ suites; some boot @iedora/auth-testkit
        # for integration coverage (impersonation, role-escalation, JWKS).
        run: bun run test

  security:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Same shape as menu.yml's security job — see that file's notes for
    # why scan-ref is the whole repo (Bun workspaces dedupe at the root).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy SBOM (SPDX JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: genkan-sbom.spdx.json
          exit-code: '0'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: genkan-sbom
          path: genkan-sbom.spdx.json
          retention-days: 90
