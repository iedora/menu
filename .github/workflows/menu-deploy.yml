# Menu CD — fires after the Menu CI workflow completes successfully on main.
#
# Triggers:
#   - workflow_run: green Menu CI on main → auto-deploy
#   - workflow_dispatch: manual redeploy (no CI re-run)
#
# Why workflow_run, not push paths: the upstream CI workflow already encodes
# the "did anything in menu change" question via its paths: filter. If CI
# ran AND passed AND it was on main, that's the signal — no second filter.

name: Menu deploy

on:
  workflow_run:
    workflows: ['Menu']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy (defaults to current main)'
        required: false
        type: string

# Per-product serialization. cancel-in-progress: false so a deploy in flight
# isn't killed mid-roll. Lives in the caller (not the reusable workflow)
# because the reusable workflow's top-level concurrency referencing
# `inputs.*` causes a startup_failure.
concurrency:
  group: deploy-menu
  cancel-in-progress: false
  queue: max

# Least-privilege default for the GITHUB_TOKEN (OpenSSF Scorecard
# Token-Permissions). The elevated scopes the called reusable workflow
# needs live on the `deploy` job below — reusable workflows can only
# USE permissions the calling job grants, so granting them at the JOB
# level (not top-level) satisfies both.
permissions:
  contents: read

jobs:
  deploy:
    # Job-level permissions: union of what _kamal-deploy.yml's job declares.
    # packages:write for GHCR push, id-token:write for Tailscale WIF token
    # exchange + Sigstore attestations, security-events:write for the post-
    # deploy Trivy SARIF upload, attestations:write for SLSA provenance.
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      security-events: write
      attestations: write
    # Guards:
    #   - workflow_run: only when the upstream concluded SUCCESS. There is a
    #     well-documented bug (actions/runner#4035) where workflow_run can
    #     fire before the upstream completes — this gate handles that case.
    #   - workflow_dispatch: always allowed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    uses: ./.github/workflows/_kamal-deploy.yml
    with:
      product: menu
      # workflow_run gives us head_sha; workflow_dispatch lets the user pick
      # one or defaults to the SHA of the ref the dispatch fired on.
      # Use `github.event.inputs.sha` (NOT `inputs.sha`) — the `inputs`
      # context is undefined for workflow_run events and accessing it is a
      # workflow-file-parse error (startup_failure). `github.event.inputs`
      # is event-specific and safely null for workflow_run.
      sha: ${{ github.event.workflow_run.head_sha || github.event.inputs.sha || github.sha }}
      onprem_host: ${{ vars.ONPREM_HOST }}
      public_hostname: ${{ vars.MENU_PUBLIC_HOSTNAME }}
      bws_project_id: ${{ vars.BWS_PROJECT_ID }}
      ghcr_user: ${{ vars.GHCR_USER || github.repository_owner }}
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      KAMAL_SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
