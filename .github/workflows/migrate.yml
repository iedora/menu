# Build + push the `ghcr.io/eduvhc/migrate` image — distroless,
# self-contained DB migrator. See infra/migrate/Dockerfile for the
# layout + sources cited.
#
# Triggers ONLY on paths that affect the migrator's content:
#   - Migration SQL: packages/auth/drizzle/**, products/menu/drizzle/**
#   - Migrate scripts: packages/auth/scripts/**, products/menu/scripts/**
#   - The Dockerfile itself
#   - bun.lock (transitive dep updates that could affect drizzle-orm /
#     postgres-js versions)
#
# Crucially does NOT trigger on apps/web/src/ changes or other Next
# app code — that's the whole point of the split (DOCKER-2). Schema
# migrations land independently of Next deploys.

name: '[infra] migrate image'

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'packages/auth/drizzle/**'
      - 'packages/auth/scripts/**'
      - 'products/menu/drizzle/**'
      - 'products/menu/scripts/**'
      - 'infra/migrate/Dockerfile'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/migrate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/auth/drizzle/**'
      - 'packages/auth/scripts/**'
      - 'products/menu/drizzle/**'
      - 'products/menu/scripts/**'
      - 'infra/migrate/Dockerfile'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/migrate.yml'

concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build image (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-aarch64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          bin/iedora-env bash -c '
            set -euo pipefail
            [ -n "${IAC_BOOTSTRAP_GHCR_TOKEN:-}" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
            echo "$IAC_BOOTSTRAP_GHCR_TOKEN" | docker login ghcr.io -u eduvhc --password-stdin
          '

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/migrate/Dockerfile
          platforms: linux/arm64
          tags: |
            ghcr.io/eduvhc/migrate:latest
            ghcr.io/eduvhc/migrate:${{ github.sha }}
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=migrate-arm64
          cache-to: type=gha,mode=max,scope=migrate-arm64

      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/eduvhc/migrate
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
