# Pipeline — 4 jobs com path-based change detection.
#
#   changes      → detecta o que mudou (code / docker)
#   correctness  → typecheck + lint + test (só se code mudou)
#   security     → gitleaks + hadolint + osv-scanner (sempre em PR/push/cron)
#   image        → build + push para ghcr.io/iedora/frontend (push em main; PR só builda)
#                  com cache GHA, provenance + SBOM, e attestation assinada.
#
# Cron weekly só corre `security` (changes/correctness/image skipam via `if:`)
# — apanha CVEs novas sem precisar de push.
#
# Action pins (Node 24 runtime — Node 20 deprecação rolling 2026):
#   actions/checkout@v6.0.2       (2026-01-09)
#   oven-sh/setup-bun@v2.2.0      (2026-03-14, auto-cacha ~/.bun/install/cache)
#   dorny/paths-filter@v4.0.1     (2026-03-17)
#   hadolint/hadolint-action@v3.3.0
#   docker/setup-buildx-action@v4.1.0  docker/login-action@v4.2.0
#   docker/metadata-action@v6.1.0      docker/build-push-action@v7.2.0
#   actions/attest-build-provenance@v4.1.0
#   gitleaks 8.30.1, osv-scanner 2.3.8

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Segunda 06:00 UTC

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path filter. `correctness` gate-iza em `code`. `security` ignora.
  # ─────────────────────────────────────────────────────────────────
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/package.json'
              - 'bun.lock'
              - '**/tsconfig*.json'
              - '**/vitest.config.*'
              - '**/eslint.config.*'
            docker:
              - '**/Dockerfile'

  # ─────────────────────────────────────────────────────────────────
  # typecheck + lint + test. setup-bun@v2.2 auto-cacha
  # ~/.bun/install/cache — sem actions/cache manual.
  # ─────────────────────────────────────────────────────────────────
  correctness:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    concurrency:
      group: correctness-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  # ─────────────────────────────────────────────────────────────────
  # gitleaks (history scan) + hadolint (Dockerfile lint) + osv-scanner
  # (lockfile CVEs). hadolint-action emite annotations natively; OSV
  # usa gh-annotations format. Gitleaks binário evita o
  # GITLEAKS_LICENSE da action oficial (gated em repos de org).
  # ─────────────────────────────────────────────────────────────────
  security:
    concurrency:
      group: security-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gitleaks varre todo o histórico

      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --baseline-path .gitleaks-baseline.json \
            --redact --verbose --no-banner --exit-code 1

      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/web/Dockerfile
          failure-threshold: error  # warnings anotam, não bloqueiam

      - name: osv-scanner
        run: |
          curl -fsSL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x osv-scanner
          ./osv-scanner --lockfile=bun.lock --format gh-annotations

  # ─────────────────────────────────────────────────────────────────
  # Build the deployable image and push to GHCR. Pushes only on `main`;
  # PRs build (validating the Dockerfile) without pushing. linux/amd64
  # (single swarm node). NEXT_PUBLIC_* bake from productUrl()'s canonical
  # fallback — apps/web/.env is excluded by .dockerignore, so prod URLs
  # land in the bundle automatically. Consumed by iedora/infra's web role.
  # ─────────────────────────────────────────────────────────────────
  image:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true' || needs.changes.outputs.docker == 'true'
    concurrency:
      group: image-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write       # push to GHCR
      id-token: write       # keyless attestation signing
      attestations: write   # write the provenance attestation
    env:
      IMAGE: ghcr.io/iedora/frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEPLOYMENT_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
