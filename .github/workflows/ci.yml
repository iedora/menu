# Pipeline — 3 jobs para correctness + security.
# Deploy é Mac-driven (`bun run deploy`) — sem job de deploy aqui.
#
#   changes → path filter (output `code`)        [PR + push main + dispatch]
#   ci      → correctness (typecheck/lint/test)  [needs code=true; skip cron]
#   audit   → security    (gitleaks/hadolint/osv) [PR + push main + dispatch + cron]
#
# `code` = .ts/.tsx/.js/.mjs/.cjs, package.json, bun.lock,
#         tsconfig*, vitest.config*, eslint.config*
#
# NÃO accionam ci (apenas `audit` corre):
#   docs/**, *.md, AGENTS.md, .gitignore,
#   .github/workflows/**, .github/audit/**,
#   infra/**
#
# `audit` corre sempre — gitleaks scan histórico, secrets podem aparecer
# em docs também. Cron weekly só corre `audit` (skip ci via `if:`) — CVE
# database refresca-se sem push.

name: Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Segunda 06:00 UTC — pesca CVEs novas

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/package.json'
              - 'bun.lock'
              - '**/tsconfig*.json'
              - '**/vitest.config.*'
              - '**/eslint.config.*'

  ci:
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: typecheck (all workspaces, paralelo, tsgo)
        run: bun run typecheck

      - name: lint (all workspaces, paralelo, eslint)
        run: bun run lint

      - name: test (all workspaces, sequencial, vitest internamente paraleliza)
        run: bun run test

  audit:
    concurrency:
      group: audit-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1
      HADOLINT_VERSION: 2.14.0
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks varre commits — precisa do histórico completo.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Cache audit binaries
        uses: actions/cache@v4
        with:
          path: /opt/audit-bin
          key: audit-${{ env.GITLEAKS_VERSION }}-${{ env.HADOLINT_VERSION }}-${{ env.OSV_VERSION }}

      - name: Install audit binaries (cache miss only)
        shell: bash
        run: sudo .github/audit/install-tools.sh

      - name: gitleaks (secret scan — full history, baseline-filtered)
        run: /opt/audit-bin/gitleaks detect --baseline-path .gitleaks-baseline.json --redact --verbose --no-banner --exit-code 1

      - name: hadolint (Dockerfile lint)
        run: .github/audit/run-hadolint.sh apps/web/Dockerfile

      - name: osv-scanner (lockfile CVEs)
        run: /opt/audit-bin/osv-scanner --lockfile=bun.lock --format gh-annotations
