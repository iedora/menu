# CodeQL SAST — GitHub's first-party static analysis.
#
# Complements Trivy (which is purely SCA — known CVEs in dependencies)
# by catching application-level vulns: SQL injection, XSS, prototype
# pollution, hardcoded crypto, taint flow from user input → exec, etc.
#
# Findings appear in the Security tab → Code scanning, grouped per
# language. The `language` matrix is one entry today (TS+JS combined)
# but stays a matrix so adding (say) `go` later is a one-line change.
#
# Paths filter (allowlist):
#   Only scans JS/TS source — no value in running a 20-min SAST when
#   only HCL/Go/markdown/config changed. Weekly cron still catches
#   anything missed between code-bearing commits.

name: '[security] CodeQL'

on:
  push:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.mts'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - 'bun.lock'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.mts'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - 'bun.lock'
      - 'package.json'
  schedule:
    # Monday 04:30 UTC — aligned with Renovate's weekly window so the
    # security signal lands on the same morning Eduardo reviews PRs.
    - cron: '30 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        # `javascript-typescript` covers both .ts and .js in one analysis
        # run — CodeQL's native combined language since 2024. Splitting
        # them gains nothing and doubles the runtime.
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds queries beyond the default suite
          # (e.g. clear-text logging, weak crypto defaults). Some false-
          # positive risk but solo-project — easier to triage than miss.
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
