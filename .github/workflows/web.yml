# `apps/web` CI + image build/push.
#
# Runs the shell's gates (typecheck + lint + Trivy/SBOM) on every push + PR.
# On push to main, after the gates pass, builds the web image for
# linux/arm64, pushes it to GHCR (`ghcr.io/eduvhc/web:latest` + commit
# SHA), then invokes the Stage-4 deploy workflow with the image SHA
# pinned.
#
# Architecture note: the web container is owned by Stage 4
# (`infra/deploy/cmd/iedora/runtime_docker.go`, dockerOnHetzner runtime),
# NOT by Tofu. The SHARED services (postgres, cloudflared, openobserve,
# backups) live in the rendered compose stack — see
# `infra/iac/tofu/compose.tf`. CI's job is build + push; the deploy
# job SSHes to the box, pulls the pinned image, and hot-swaps the
# container.
#
# Unit + E2E tests live with the products that own the code — see
# `[product:menu] CI` (Vitest + Playwright), `[product:core] CI`,
# `[package:*] CI`. They run on their own paths-filtered triggers and
# are NOT a gate on this workflow.

name: '[apps:web] CI'

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/web.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/web.yml'
      - '.github/actions/setup/**'
  # Re-trigger the real hosted runner without a new commit:
  #   gh workflow run web.yml --ref <branch>
  # Useful for verifying a green local repro against actual CI hardware
  # without polluting git history with "fix(ci): try again" commits.
  workflow_dispatch:

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. The build job below escalates
# (packages:write for GHCR push, id-token:write for Sigstore attestations,
# actions:write for the infra-deploy dispatch).
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  # Note: unit + e2e tests moved to `[product:menu] CI` after the
  # Phase 3b split (#42) — menu slices live in @iedora/product-menu now.
  # apps/web keeps only the integration concerns: typecheck, lint,
  # security scan, the Docker build, and the deploy gate.

  security:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Scans the workspace lockfile (Bun workspaces dedupe deps at the root,
    # so the relevant CVE surface is the whole repo). HIGH/CRITICAL gates
    # the run; --ignore-unfixed avoids failing on CVEs with no patch yet.
    # `.trivyignore` at repo root holds accepted exceptions.
    steps:
      - uses: actions/checkout@v6
      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy SBOM (SPDX JSON)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: web-sbom.spdx.json
          exit-code: '0'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-sbom
          path: web-sbom.spdx.json
          retention-days: 90

  # Note: E2E (Playwright) moved to `[product:menu] CI` (product-menu.yml)
  # after the Phase 3b split (#42) — the menu's e2e harness lives at
  # products/menu/tests/e2e/ and tests the menu surface, so it belongs
  # with the menu's CI signal, not the apps/web shell's.

  # ── Per-arch native build ───────────────────────────────────────────────
  # Matrix splits the build across two NATIVE runners — `ubuntu-24.04`
  # (amd64) + `ubuntu-24.04-arm` (Ampere Altra, free for public repos
  # since 2025). No QEMU, no emulation tax. Each arch builds + pushes a
  # tagless blob via `push-by-digest=true`; the digest is uploaded as an
  # artifact so the merge job can stitch the manifest list. Pattern from
  # docs.docker.com/build/ci/github-actions/multi-platform.
  build:
    name: 'Build image (${{ matrix.platform }})'
    needs: [typecheck, lint, security]
    # Only on push to main — PRs run the gates only. workflow_dispatch on main
    # still triggers a build for the "re-roll latest" flow.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # arm64-only: the Hetzner box is a CAX11 (Ampere Altra arm64).
        # Building amd64 was wasted CI time + GHCR storage with no
        # consumer. If a future product needs x86 (Hetzner CX/CPX or
        # operator-laptop pull), re-add `- platform: linux/amd64 ...`.
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            bws_arch: aarch64-unknown-linux-gnu

    permissions:
      contents: read
      packages: write         # `docker push ghcr.io/eduvhc/web`
      id-token: write         # Sigstore attestations (SLSA provenance + SBOM)
      attestations: write     # attach attestations to the GHCR image

    steps:
      - uses: actions/checkout@v6

      # `/` is illegal in artifact names. `linux/amd64` → `linux-amd64`.
      - name: Derive platform slug
        id: slug
        run: echo "value=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The `ghcr.io/eduvhc/web` package was originally created under
      # Eduardo's personal PAT, so GITHUB_TOKEN (scoped to the iedora repo)
      # can't push to it. IAC_BOOTSTRAP_GHCR_TOKEN is the same PAT, mirrored to
      # BWS + GHA secrets via Tofu. Fetch from BWS to keep it off the
      # repo's plaintext secrets list.
      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
          BWS_ARCH: ${{ matrix.bws_arch }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-${BWS_ARCH}-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN=$(bws secret list "$BWS_PROJECT_ID" -o json \
            | jq -r '.[] | select(.key=="IAC_BOOTSTRAP_GHCR_TOKEN") | .value')
          [ -n "$TOKEN" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$TOKEN" | docker login ghcr.io -u eduvhc --password-stdin

      # Build context: REPO ROOT (Bun workspace) — Dockerfile copies in
      # `package.json`, `bun.lock`, `tsconfig.base.json`, and every
      # workspace under `packages/` + `products/`. See
      # apps/web/Dockerfile for the multi-stage layout.
      #
      # `push-by-digest=true` + `name-canonical=true` → the registry
      # gets a tagless blob keyed by sha256. The merge job then runs
      # `docker buildx imagetools create` to publish `:latest` /
      # `:<sha>` as a manifest list fanning over both digests.
      #
      # GHA cache scope is per-arch so the two matrix legs don't stomp
      # on each other's intermediate stages.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/eduvhc/web,push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=web-${{ steps.slug.outputs.value }}
          cache-to: type=gha,mode=max,scope=web-${{ steps.slug.outputs.value }}

      # Stash the digest as a 0-byte file named for the sha256. The
      # merge job globs `*` over the unpacked artifacts and turns them
      # back into `ghcr.io/eduvhc/web@sha256:<digest>` refs.
      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-web-${{ steps.slug.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 1b: stitch the arm64 digest into a manifest list ───────────────
  # Wraps the single arm64 digest pushed above into a manifest list tagged
  # `:latest` + `:<sha>`. The list is the same shape that arm64+amd64
  # would have produced — single-platform today, ready to fan out to
  # multi-arch when a consumer needs x86.
  merge:
    name: Merge multi-arch manifest
    needs: [build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}

    permissions:
      contents: read
      packages: write
      id-token: write         # Sigstore attestation on the merged manifest
      attestations: write
      actions: write          # dispatch the deploy workflow

    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-web-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN=$(bws secret list "$BWS_PROJECT_ID" -o json \
            | jq -r '.[] | select(.key=="IAC_BOOTSTRAP_GHCR_TOKEN") | .value')
          [ -n "$TOKEN" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$TOKEN" | docker login ghcr.io -u eduvhc --password-stdin

      # `imagetools create` treats each `name@sha256:<digest>` source as
      # one platform descriptor and rewrites the destination manifest
      # list to fan over all of them.
      #
      # Image refs:
      #   - `:latest` is the floating tag, useful for ad-hoc inspection.
      #   - `:<sha>` is what Stage 4 (dockerOnHetzner) actually pulls —
      #     immutable handle, also the subject of attestations + the
      #     rollback knob via `gh workflow run deploy.yml --field image_sha=…`.
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t ghcr.io/eduvhc/web:latest \
            -t ghcr.io/eduvhc/web:${{ github.sha }} \
            $(printf 'ghcr.io/eduvhc/web@sha256:%s ' *)

      # Pull the manifest list digest back so the attestation has a
      # stable subject. `imagetools inspect --format` is the canonical
      # way; `docker manifest inspect` returns parsed JSON, not the
      # canonical byte stream.
      - name: Inspect merged manifest digest
        id: inspect
        run: |
          set -euo pipefail
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/eduvhc/web:${{ github.sha }}" --format '{{json .Manifest}}' \
            | jq -r '.digest')
          [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ] || { echo "failed to resolve manifest digest" >&2; exit 1; }
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # ── Supply-chain attestations (SLSA build provenance) ──────────
      # Keyless Cosign signature via Sigstore + GitHub OIDC, attached
      # to the manifest list digest so `gh attestation verify oci://...`
      # resolves against the multi-arch image as a unit.
      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/eduvhc/web
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true

  # ── Gate: wait for Stage 3 (DB migrations) to be green ──────────────────
  # Stage 4's `dockerOnHetzner.Deploy` starts the web container, which
  # immediately reads `core.session` on every request. If Stage 3 hasn't
  # applied the `@iedora/auth` migrations yet, the boot 500s. On a fresh
  # Day 1 the chain is: infra-deploy.yml provisions the box → app-state
  # (workflow_run) waits for THIS image to land → applies core +
  # menu schemas → then this gate flips green and `deploy` proceeds.
  #
  # Day-2 (apps/web-only push): the latest app-state run is already
  # success from a prior CI run, this step returns ~immediately.
  wait_app_state:
    name: Wait for app-state
    needs: merge
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
    steps:
      - name: Poll app-state.yml status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 1700 ))   # ~28 min, below job timeout
          while true; do
            run=$(gh run list \
                    --repo "${{ github.repository }}" \
                    --workflow=app-state.yml \
                    --branch=main \
                    --limit 1 \
                    --json status,conclusion,databaseId,createdAt -q '.[0]' || echo '{}')
            status=$(echo "$run" | jq -r '.status // "absent"')
            conclusion=$(echo "$run" | jq -r '.conclusion // ""')
            case "$status" in
              completed)
                if [ "$conclusion" = "success" ]; then
                  echo "✓ app-state.yml green (run #$(echo "$run" | jq -r .databaseId))"
                  exit 0
                fi
                echo "✗ app-state.yml ${conclusion} — refusing to deploy"
                exit 1
                ;;
              absent)
                echo "no app-state.yml run yet — waiting 30s"
                ;;
              *)
                echo "app-state.yml status=${status} — waiting 30s"
                ;;
            esac
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "✗ app-state.yml didn't finish within budget — abort"
              exit 1
            fi
            sleep 30
          done

  # ── Stage 4: deploy the freshly-built image ─────────────────────────────
  # Invokes the reusable deploy.yml workflow with product=web + this
  # commit's SHA. The dockerOnHetzner runtime (products.go) reads
  # MENU_IMAGE_SHA from env to pin the image — no more TF_VAR + tofu
  # apply round-trip. Rollback path: `gh workflow run deploy.yml
  # --field product=web --field image_sha=<older-sha>`.
  deploy:
    needs: wait_app_state
    uses: ./.github/workflows/deploy.yml
    with:
      product: web
      image_sha: ${{ github.sha }}
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
