services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: menu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d menu"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LocalStack stands in for S3 in dev so CI and local share the same backend
  # (the public minio/minio and bitnami/minio Docker images were both
  # deprecated in 2025; LocalStack is the maintained S3 mock that auto-boots
  # without a `command:` override — needed because GH Actions service
  # containers don't accept one). The SDK is configured with
  # `forcePathStyle: true` already, which is the only LocalStack requirement.
  localstack:
    image: localstack/localstack:4
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q s3"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  localstack_data:
