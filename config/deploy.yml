# Kamal 2 — on-prem deploy config.
#
# Single target: <%= ENV.fetch("ONPREM_HOST") %> (the on-prem box). TLS terminates at the
# Cloudflare edge (`make onprem-up` provisions the tunnel + DNS), so
# kamal-proxy serves plain HTTP and trusts X-Forwarded-* headers.
#
# Env vars must be sourced before running kamal commands:
#   source .envrc                 # PUBLIC_HOSTNAME, S3_ENDPOINT, S3_BUCKET, S3_REGION
#
# Secrets resolved from .kamal/secrets-common at deploy time.

service: meta-menu

image: eduvhc/meta-menu

servers:
  web:
    hosts:
      - <%= ENV.fetch("ONPREM_HOST") %>

proxy:
  ssl: false                              # Cloudflare Tunnel does TLS
  host: <%= ENV.fetch("PUBLIC_HOSTNAME") %>
  app_port: 3000
  # When ssl: false, kamal-proxy does NOT forward X-Forwarded-* by default.
  # Cloudflare Tunnel sets them; opt in to preserve client IP / proto.
  forward_headers: true
  healthcheck:
    path: /up
    interval: 1
    timeout: 5
  buffering:
    requests: true
    responses: true
    # Default is 1 GB — way too loose. Image uploads cap is ~5 MB
    # client-side; 10 MB here gives headroom.
    max_request_body: 10_000_000

# GHCR via the gh-CLI token (gitignored secrets file resolves it).
registry:
  server: ghcr.io
  username: eduvhc
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: deploy
  port: 22

builder:
  arch: amd64
  cache:
    type: registry
    image: ghcr.io/eduvhc/meta-menu-build-cache
    options: mode=max,compression=zstd

env:
  clear:
    NEXT_TELEMETRY_DISABLED: "1"
    BETTER_AUTH_URL: <%= "https://#{ENV.fetch('PUBLIC_HOSTNAME')}" %>
    # S3 config comes from .envrc (set by scripts/onprem-sync.sh after `make onprem-up`).
    S3_ENDPOINT: <%= ENV.fetch("S3_ENDPOINT") %>
    S3_REGION:   <%= ENV.fetch("S3_REGION", "us-east-1") %>
    S3_BUCKET:   <%= ENV.fetch("S3_BUCKET", "metamenu") %>
  secret:
    - BETTER_AUTH_SECRET
    - DATABASE_URL
    - REDIS_URL
    - S3_ACCESS_KEY
    - S3_SECRET_KEY

# Accessories on the same box. Crucial: NO `port: "x:x"` key (= 0.0.0.0
# publish) — Docker's NAT rules sit BEFORE UFW's filter rules, so a published
# port is NOT firewall-protected (basecamp/kamal#1790). The app reaches them
# via the `kamal` Docker network using container names.
#
# MinIO is the exception: cloudflared on the host points at 127.0.0.1:9000
# so we DO publish, but to loopback only.
accessories:
  postgres:
    image: postgres:18-alpine
    host: <%= ENV.fetch("ONPREM_HOST") %>
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: metamenu
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    host: <%= ENV.fetch("ONPREM_HOST") %>
    directories:
      - data:/data

  # S3-compatible storage. MinIO root creds double as S3 access keys —
  # S3_ACCESS_KEY = MINIO_ROOT_USER, S3_SECRET_KEY = MINIO_ROOT_PASSWORD.
  # All from .kamal/secrets-common.
  minio:
    image: minio/minio:latest
    host: <%= ENV.fetch("ONPREM_HOST") %>
    port: "127.0.0.1:9000:9000"           # loopback — only cloudflared on the host hits this
    cmd: server /data --console-address ":9001"
    env:
      secret:
        - MINIO_ROOT_USER
        - MINIO_ROOT_PASSWORD
    directories:
      - data:/data
