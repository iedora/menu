# Kamal 2 — config de deploy
# https://kamal-deploy.org

service: meta-menu

# Substitui pelo teu utilizador/imagem na registry
image: eduvhc/meta-menu

servers:
  web:
    hosts:
      - 127.0.0.1   # placeholder — substitui pelo IP do servidor (output do Tofu)
    options:
      add-host: "host.docker.internal:host-gateway"

# Reverse proxy (kamal-proxy) gere TLS + zero-downtime. Para deploy LOCAL contra o
# container Ubuntu, desliga-se SSL (não há domínio real). Em prod: ssl: true + host: <dominio>.
proxy:
  ssl: false
  host: localhost
  app_port: 3000
  healthcheck:
    path: /
    interval: 5

# Registry — Kamal precisa de pushar a imagem para algures acessível ao servidor.
# GHCR é gratuito e funciona com o GITHUB_TOKEN (read:packages + write:packages).
registry:
  server: ghcr.io
  username: eduvhc
  password:
    - KAMAL_REGISTRY_PASSWORD

# SSH para o servidor — `deploy` user, porta 2222 quando local, 22 em prod.
ssh:
  user: deploy
  port: 2222   # mudar para 22 em prod

builder:
  arch: amd64

# Variáveis de ambiente — secrets vêm de .kamal/secrets, clear vão para o repo.
env:
  clear:
    NEXT_TELEMETRY_DISABLED: "1"
    BETTER_AUTH_URL: http://localhost
    S3_ENDPOINT: http://localstack:4566   # ajustar em prod (R2/S3)
    S3_REGION: us-east-1
    S3_BUCKET: metamenu
  secret:
    - BETTER_AUTH_SECRET
    - DATABASE_URL
    - REDIS_URL
    - S3_ACCESS_KEY
    - S3_SECRET_KEY

# Serviços que correm no mesmo servidor (Postgres, Redis). Em prod podes
# substituir Postgres por Neon/Supabase e remover o accessory.
accessories:
  postgres:
    image: postgres:18-alpine
    host: 127.0.0.1
    port: "5432:5432"
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: metamenu
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql   # Postgres 18+: novo layout (não /data)

  redis:
    image: redis:7-alpine
    host: 127.0.0.1
    port: "6379:6379"
    directories:
      - data:/data
